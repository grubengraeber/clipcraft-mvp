version: '3.9'
services:
  backend:
    build: ./backend
    container_name: auto-thumb-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/storage:/app/storage
    ports:
      - '8000:8000'

  frontend:
    build: ./frontend
    container_name: auto-thumb-frontend
    env_file:
      - ./frontend/.env
    ports:
      - '3000:3000'
    depends_on:
      - backend
